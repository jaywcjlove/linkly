name: CI
on:
  push:
    tags:
      - v*

jobs:
  tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: swift build -c release

      - name: Package Linux binary
        run: |
          mkdir -p dist
          cp .build/release/linkly dist/linkly
          chmod +x dist/linkly
          tar -czf dist/linkly-linux-x86_64.tar.gz -C dist linkly

      - name: Verify Linux release asset
        run: |
          ls -lah
          ls -lah dist
          test -f dist/linkly-linux-x86_64.tar.gz

      - name: Create Tag
        id: create_tag
        uses: jaywcjlove/create-tag-action@main
        with:
          version: ${{ steps.extract_version.outputs.VERSION }}
          release: true
          body: |
            ## Installation

            ### macOS

            ```bash
            brew install jaywcjlove/tap/linkly
            brew reinstall jaywcjlove/tap/linkly
            ```

            ### Linux

            Download `linkly-linux-x86_64.tar.gz` from this release, then:

            ```bash
            tar -xzf linkly-linux-x86_64.tar.gz
            chmod +x linkly
            ./linkly --help
            ```

      - name: Upload Linux release asset
        uses: jaywcjlove/github-action-upload-assets@main
        if: steps.create_tag.outputs.successful == 'true'
        with:
          tag: ${{ steps.create_tag.outputs.version }}
          asset-path: '["dist/linkly-linux-x86_64.tar.gz"]'